<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>鬍鬚張-月考核表 (電腦專用版)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    .brand-bg { background-color: #E05315; }
    .brand-text { color: #E05315; }
    .brand-border { border-color: #E05315; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans w-full overflow-x-hidden flex flex-col items-center justify-center">

  <!-- 1. 登入畫面 -->
  <div id="login-container" class="flex flex-col items-center justify-center min-h-screen w-full px-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border-t-8 brand-border">
      <div class="text-center mb-6">
        <h1 class="text-2xl font-black text-gray-800 tracking-wider">鬍鬚張 FORMOSA CHANG</h1>
        <p class="text-sm text-gray-500 mt-1 font-medium">代理店副理月考核系統 (電腦端)</p>
      </div>
      
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">員工工號</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
              <i class="fa-solid fa-user"></i>
            </span>
            <input type="text" id="emp-id" placeholder="請輸入工號 (例：00888)" class="w-full pl-10 pr-3 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-orange-500 focus:outline-none text-base">
          </div>
        </div>

        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">密碼 (身分證後 4 碼)</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
              <i class="fa-solid fa-lock"></i>
            </span>
            <input type="password" id="id-tail" placeholder="請輸入身分證後 4 碼" class="w-full pl-10 pr-3 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-orange-500 focus:outline-none text-base">
          </div>
        </div>

        <button onclick="handleLogin()" id="btn-login" class="w-full brand-bg text-white font-bold py-3 px-4 rounded-xl shadow-lg hover:bg-orange-700 transition duration-200 text-base">
          <i class="fa-solid fa-right-to-bracket mr-2"></i>登入系統
        </button>
        <p id="login-error" class="text-red-500 text-center font-bold text-sm mt-2 hidden"></p>
      </div>
    </div>
  </div>

  <!-- 2. 店長填寫考核表主畫面 -->
  <div id="app-container" class="hidden pb-12 w-full">
    <header class="brand-bg text-white py-4 px-6 shadow-md flex justify-between items-center sticky top-0 z-50 w-full">
      <div>
        <h2 class="text-lg font-black tracking-wide">代理店副理月考核表 (電腦專用版)</h2>
        <p class="text-xs opacity-90">表單編號：G-18-01-06-03</p>
      </div>
      <div class="text-right">
        <span id="user-info" class="font-bold text-sm block">載入中...</span>
        <button onclick="logout()" class="text-xs bg-black bg-opacity-30 px-2 py-1 rounded hover:bg-opacity-50 mt-1">登出</button>
      </div>
    </header>

    <div class="w-full max-w-6xl mx-auto px-6 mt-8">
      <div class="bg-white rounded-2xl shadow-md p-8 space-y-6">
        
        <!-- 選擇學員 -->
        <div>
          <label class="block text-base font-black text-gray-700 mb-2">
            <i class="fa-solid fa-user-check brand-text mr-1"></i> 請選擇受評儲備幹部：
          </label>
          <select id="underling-select" onchange="onUnderlingChange()" class="w-full p-3 border-2 brand-border rounded-xl focus:outline-none text-lg font-bold bg-white cursor-pointer">
            <option value="">-- 請選擇店內學員 --</option>
          </select>
        </div>

        <!-- 表頭資訊卡片 -->
        <div id="info-card-container" class="hidden bg-orange-50 border-2 border-orange-200 rounded-xl p-5 text-base space-y-2">
          <div class="grid grid-cols-2 gap-4">
            <div><span class="font-bold text-gray-500">姓名：</span><span id="info-name" class="font-black text-gray-800">-</span></div>
            <div><span class="font-bold text-gray-500">單位/轄區：</span><span id="info-store" class="font-black text-gray-800">-</span></div>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div><span class="font-bold text-gray-500">轉任日：</span><span id="info-transfer" class="font-black text-gray-800">-</span></div>
            <div><span class="font-bold text-gray-500 text-orange-600">評核日(今天)：</span><span id="info-eval-date" class="font-black text-orange-600">-</span></div>
          </div>
        </div>

        <!-- 考評大盒子 (選人後才打開) -->
        <div id="evaluation-form-container" class="hidden space-y-8">
          <hr class="border-dashed border-gray-300">

          <!-- 6大指標 (電腦端排成完美的雙排佈局) -->
          <h3 class="text-lg font-black text-gray-800 border-l-4 brand-border pl-3">訓練單位主管每月填寫 (每項 10%)</h3>
          <div class="grid grid-cols-2 gap-6" id="score-section"></div>

          <hr class="border-dashed border-gray-300">

          <!-- 綜合評語與手寫板 (電腦版：上下橫向全幅) -->
          <div class="flex flex-col gap-6 w-full">
            <!-- 綜合評語 -->
            <div class="w-full">
              <label class="block text-base font-black text-gray-700 mb-2">
                <i class="fa-solid fa-comment-dots brand-text mr-1"></i> 店經理評語：
              </label>
              <textarea id="manager-comment" class="w-full p-4 border border-gray-300 rounded-xl focus:ring-2 focus:ring-orange-500 focus:outline-none text-base h-36 resize-y" placeholder="請填寫對該學員本月的具體表現評價..."></textarea>
            </div>

            <!-- 手寫簽名板 (滑鼠簽名) -->
            <div class="bg-gray-50 p-5 rounded-xl border border-gray-200 w-full space-y-4">
              <div class="flex justify-between items-center">
                <label class="block text-base font-black text-gray-700">
                  <i class="fa-solid fa-signature brand-text mr-1"></i> 店經理簽章 (請使用滑鼠於下方灰色畫布內簽名)：
                </label>
              </div>
              
              <div id="saved-sig-box" class="hidden">
                <label class="inline-flex items-center cursor-pointer py-1">
                  <input type="checkbox" id="use-saved-sig" onchange="toggleSignatureType()" class="w-5 h-5 rounded text-orange-600 focus:ring-orange-500 border-gray-300">
                  <span class="ml-2 text-sm font-bold text-gray-700">使用系統預存簽名確認</span>
                </label>
              </div>

              <!-- 電腦版畫布容器 (固定解析度 1000x300，滑鼠繪製順暢) -->
              <div id="canvas-wrapper" class="relative bg-white border-2 border-gray-300 rounded-xl overflow-hidden h-44 w-full">
                <canvas id="signature-canvas" width="1000" height="300" class="w-full h-full block bg-white cursor-crosshair"></canvas>
                <button type="button" onclick="clearSignatureCanvas()" class="absolute bottom-3 right-3 px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 text-sm font-bold rounded-lg transition shadow-md">
                  <i class="fa-solid fa-eraser mr-1"></i>一鍵清除
                </button>
              </div>
            </div>
          </div>

          <button onclick="submitForm()" id="btn-submit" class="w-full brand-bg text-white font-bold py-4 rounded-xl shadow-lg text-xl hover:bg-orange-700 transition">
            <i class="fa-solid fa-paper-plane mr-2"></i>送出考核表
          </button>
        </div>

      </div>
    </div>
  </div>

  <!-- 確認彈窗 -->
  <div id="custom-confirm-modal" class="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 hidden px-4">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm border-t-8 brand-border overflow-hidden">
      <div class="p-6 text-center">
        <div class="w-16 h-16 bg-orange-100 rounded-full flex items-center justify-center mx-auto mb-4">
          <i class="fa-solid fa-triangle-exclamation text-3xl brand-text"></i>
        </div>
        <h3 class="text-xl font-black text-gray-800 mb-2">確定送出考核嗎？</h3>
        <p id="confirm-modal-text" class="text-gray-600 text-sm leading-relaxed mb-6">確定要送出考核嗎？送出後店長將無法再修改分數！</p>
        <div class="flex gap-3">
          <button onclick="closeConfirmModal()" class="flex-1 py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold rounded-xl transition">取消</button>
          <button onclick="executeSubmit()" class="flex-1 py-3 brand-bg hover:bg-orange-700 text-white font-bold rounded-xl shadow-md transition">確定送出</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Loading -->
  <div id="loading-spinner" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[9999] pointer-events-auto hidden">
    <div class="bg-white p-6 rounded-2xl flex flex-col items-center shadow-2xl">
      <div class="animate-spin rounded-full h-12 w-12 border-t-4 brand-border border-gray-200"></div>
      <p class="mt-4 font-bold text-gray-700 text-sm">處理中，請稍候...</p>
    </div>
  </div>

  <script>
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbysdFVEq81YuSme1wp72i_MePw2P2TkGPysYJ1gJEvC-58DTuzCkyZbwMddqjiBMTuJ/exec";

    const metrics = [
      {
        id: 1,
        title: "責任感",
        ranges: [
          { label: "8 ~ 10 分", min: 8, max: 10, text: "責任感相當強,可以充分信賴,無須任何督促。" },
          { label: "6 ~ 7 分", min: 6, max: 7, text: "可獨自負責,處事穩健,須偶爾督促。" },
          { label: "3 ~ 5 分", min: 3, max: 5, text: "可以信賴,但須略加督促。" },
          { label: "1 ~ 2 分", min: 1, max: 2, text: "處事被動,不積極,必須有人經常加以督促。" }
        ]
      },
      {
        id: 2,
        title: "協調性",
        ranges: [
          { label: "8 ~ 10 分", min: 8, max: 10, text: "能主動與人協調與上級員維持和諧關係,同事極願與其合作。" },
          { label: "6 ~ 7 分", min: 6, max: 7, text: "能與人和諧相處,願接納他人意見而不固執,偶亦屬熱心助人。" },
          { label: "3 ~ 5 分", min: 3, max: 5, text: "雖不特別致力於他人協調,但亦不與他人發生爭執與摩擦。" },
          { label: "1 ~ 2 分", min: 1, max: 2, text: "缺乏協調與同事間偶爾會摩擦。" }
        ]
      },
      {
        id: 3,
        title: "表達能力",
        ranges: [
          { label: "8 ~ 10 分", min: 8, max: 10, text: "文筆、言談、論理明確,能化繁為簡,密而不漏。" },
          { label: "6 ~ 7 分", min: 6, max: 7, text: "表達有條理,使人易於了解。" },
          { label: "3 ~ 5 分", min: 3, max: 5, text: "表達平平,大致可了解其意,不致引人誤解。" },
          { label: "1 ~ 2 分", min: 1, max: 2, text: "文筆生硬言談欠明確不易讓人了解。" }
        ]
      },
      {
        id: 4,
        title: "學習態度",
        ranges: [
          { label: "8 ~ 10 分", min: 8, max: 10, text: "針對突發狀況,能主動積極提出疑問虛心求救。" },
          { label: "6 ~ 7 分", min: 6, max: 7, text: "能誠懇接受他人教導,但主動較弱。" },
          { label: "3 ~ 5 分", min: 3, max: 5, text: "能誠懇接受他人教導,但主動較弱。" },
          { label: "1 ~ 2 分", min: 1, max: 2, text: "不能主動學習,須加以督導。" }
        ]
      },
      {
        id: 5,
        title: "解決問題能力",
        ranges: [
          { label: "8 ~ 10 分", min: 8, max: 10, text: "針對可能發生之問題,極求解,並予以解決。能迅速謀求改善對策,需督促即可完成。" },
          { label: "6 ~ 7 分", min: 6, max: 7, text: "具有解決問題之能力,但須督促完成。" },
          { label: "3 ~ 5 分", min: 3, max: 5, text: "能謀求改善之道,但無擔當之魄力。" },
          { label: "1 ~ 2 分", min: 1, max: 2, text: "無法迅速謀求改善對策,並有逃避之現象。" }
        ]
      },
      {
        id: 6,
        title: "個人儀容",
        ranges: [
          { label: "8 ~ 10 分", min: 8, max: 10, text: "整齊清潔,端正足為模範。" },
          { label: "6 ~ 7 分", min: 6, max: 7, text: "重視清潔衛生。" },
          { label: "3 ~ 5 分", min: 3, max: 5, text: "達到基本要求。" },
          { label: "1 ~ 2 分", min: 1, max: 2, text: "我行我素,須經常糾正才會改進。" }
        ]
      }
    ];

    let currentUser = null;
    let subordinateCache = []; 
    let activeRanges = {};     
    let selectedScores = {};   
    let pendingPayload = null; 

    let canvas, ctx, isDrawing = false;
    let sigCanvasInit = false;

    function renderMetrics() {
      const section = document.getElementById('score-section');
      section.innerHTML = '';
      
      metrics.forEach(m => {
        let rangesHTML = '';
        m.ranges.forEach(r => {
          let scoreButtons = '';
          for(let s = r.min; s <= r.max; s++) {
            scoreButtons += `
              <button type="button" 
                      onclick="selectExactScore(event, ${m.id}, ${s}, ${r.min}, ${r.max})" 
                      id="btn-score-${m.id}-${s}" 
                      class="px-4 py-1.5 bg-white border border-gray-300 rounded-full text-xs font-bold text-gray-700 hover:border-orange-500 transition">
                ${s}分
              </button>
            `;
          }
          
          rangesHTML += `
            <div id="range-card-${m.id}-${r.min}-${r.max}" 
                 onclick="clickRangeCard(${m.id}, ${r.min}, ${r.max})" 
                 class="p-4 border border-gray-200 rounded-xl bg-white cursor-pointer hover:bg-orange-50/50 hover:border-orange-300 transition duration-150">
              <div class="flex justify-between items-center mb-1">
                <span class="text-xs font-black text-orange-600 bg-orange-100 px-2 py-0.5 rounded-full">${r.label}</span>
                <span id="check-icon-${m.id}-${r.min}-${r.max}" class="text-orange-500 hidden"><i class="fa-solid fa-circle-check text-sm"></i></span>
              </div>
              <p class="text-sm text-gray-700 font-medium mb-3">${r.text}</p>
              <div class="flex flex-wrap gap-2">
                ${scoreButtons}
              </div>
            </div>
          `;
        });
        
        const card = `
          <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm space-y-3">
            <div class="flex justify-between items-center border-b pb-2">
              <span class="font-black text-gray-800 text-base flex items-center">
                <span class="w-1.5 h-5 brand-bg mr-2 rounded-full"></span>
                ${m.id}. ${m.title}
              </span>
              <span id="final-badge-${m.id}" class="text-xs font-black bg-gray-100 text-gray-500 px-2.5 py-1 rounded-full">未評分</span>
            </div>
            <div class="grid grid-cols-1 gap-3">
              ${rangesHTML}
            </div>
          </div>
        `;
        section.innerHTML += card;
      });
    }

    function selectExactScore(event, metricId, score, min, max) {
      if(event) event.stopPropagation();
      
      const prevScore = selectedScores[metricId];
      if (prevScore) {
        const prevBtn = document.getElementById(`btn-score-${metricId}-${prevScore}`);
        if (prevBtn) prevBtn.className = "px-4 py-1.5 bg-white border border-gray-300 rounded-full text-xs font-bold text-gray-700 hover:border-orange-500 transition";
      }
      
      if (activeRanges[metricId]) {
        const prevKey = activeRanges[metricId];
        const prevCard = document.getElementById(`range-card-${metricId}-${prevKey}`);
        if (prevCard) prevCard.className = "p-4 border border-gray-200 rounded-xl bg-white cursor-pointer hover:bg-orange-50/50 hover:border-orange-300 transition duration-150";
        const prevCheck = document.getElementById(`check-icon-${metricId}-${prevKey}`);
        if (prevCheck) prevCheck.classList.add('hidden');
      }
      
      const key = `${min}-${max}`;
      const currentCard = document.getElementById(`range-card-${metricId}-${key}`);
      if (currentCard) currentCard.className = "p-4 border-2 border-orange-500 rounded-xl bg-orange-50/50 cursor-pointer ring-2 ring-orange-200 transition duration-150";
      const currentCheck = document.getElementById(`check-icon-${metricId}-${key}`);
      if (currentCheck) currentCheck.classList.remove('hidden');
      
      const btn = document.getElementById(`btn-score-${metricId}-${score}`);
      if (btn) btn.className = "px-4 py-1.5 brand-bg text-white border-transparent rounded-full text-xs font-bold shadow-md transition";
      
      selectedScores[metricId] = score;
      activeRanges[metricId] = key;
      
      const badge = document.getElementById(`final-badge-${metricId}`);
      badge.innerText = `${score} 分`;
      badge.className = "text-xs font-black brand-bg text-white px-2.5 py-1 rounded-full shadow-sm";
    }

    function clickRangeCard(metricId, min, max) {
      selectExactScore(null, metricId, max, min, max);
    }

    // 電腦版精確座標計算 (滑鼠)
    function getCanvasCoords(e) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (e.clientX - rect.left) * (canvas.width / rect.width),
        y: (e.clientY - rect.top) * (canvas.height / rect.height)
      };
    }

    function initSignatureCanvas() {
      if (sigCanvasInit) return;
      canvas = document.getElementById('signature-canvas');
      ctx = canvas.getContext('2d');
      
      ctx.strokeStyle = "#333333";
      ctx.lineWidth = 4;
      ctx.lineCap = "round";
      
      // 滑鼠畫圖 (電腦專用，不綁定觸控事件，避開所有行動端 Bug)
      canvas.addEventListener('mousedown', (e) => {
        isDrawing = true;
        ctx.strokeStyle = "#333333"; ctx.lineWidth = 4; ctx.lineCap = "round";
        const coords = getCanvasCoords(e);
        ctx.beginPath();
        ctx.moveTo(coords.x, coords.y);
      });
      canvas.addEventListener('mousemove', (e) => {
        if (!isDrawing) return;
        const coords = getCanvasCoords(e);
        ctx.lineTo(coords.x, coords.y);
        ctx.stroke();
      });
      window.addEventListener('mouseup', () => { isDrawing = false; });
      
      sigCanvasInit = true;
    }

    function clearSignatureCanvas() {
      if (!canvas) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function toggleSignatureType() {
      const isChecked = document.getElementById('use-saved-sig').checked;
      const canvasWrapper = document.getElementById('canvas-wrapper');
      if (isChecked) {
        canvasWrapper.classList.add('hidden');
      } else {
        canvasWrapper.classList.remove('hidden');
        initSignatureCanvas();
      }
    }

    function isCanvasBlank() {
      if (!canvas) return true;
      const blank = document.createElement('canvas');
      blank.width = canvas.width;
      blank.height = canvas.height;
      return canvas.toDataURL() === blank.toDataURL();
    }

    // API 連線工具
    function callAPI(action, data, successCallback) {
      const payload = Object.assign({ action: action }, data);
      showLoading(true); 
      
      fetch(GAS_API_URL, {
        method: "POST",
        body: JSON.stringify(payload)
      })
      .then(res => {
        if (!res.ok) throw new Error("Google 伺服器連線失敗，請檢查網路！");
        return res.text();
      })
      .then(text => {
        showLoading(false); 
        try {
          const resData = JSON.parse(text);
          successCallback(resData);
        } catch (jsonErr) {
          console.error("後端回應內容：", text);
          throw new Error("伺服器傳回了無效格式資料！");
        }
      })
      .catch(err => {
        showLoading(false); 
        alert("❌ 連線失敗！原因：" + err.message);
      });
    }

    // 登入
    function handleLogin() {
      const empId = document.getElementById('emp-id').value.trim();
      const idTail = document.getElementById('id-tail').value.trim();
      const errorEl = document.getElementById('login-error');
      
      if(!empId || !idTail) {
        errorEl.innerText = "請輸入工號與密碼！";
        errorEl.classList.remove('hidden');
        return;
      }
      
      showLoading(true);
      errorEl.classList.add('hidden');
      
      callAPI("login", { empId: empId, idTail: idTail }, function(result) {
        showLoading(false);
        if(result.success) {
          currentUser = result;
          document.getElementById('login-container').classList.add('hidden');
          document.getElementById('app-container').classList.remove('hidden');
          
          document.getElementById('info-card-container').classList.add('hidden');
          document.getElementById('evaluation-form-container').classList.add('hidden');
          document.getElementById('user-info').innerText = `${result.name} (${result.title})`;
          
          const savedSigBox = document.getElementById('saved-sig-box');
          const hasSavedSig = result.savedSignature && String(result.savedSignature).trim() !== "";
          if (hasSavedSig) {
            savedSigBox.classList.remove('hidden');
            document.getElementById('use-saved-sig').checked = true;
          } else {
            savedSigBox.classList.add('hidden');
            document.getElementById('use-saved-sig').checked = false;
          }
          
          loadUnderlings(result.store);
        } else {
          errorEl.innerText = result.message;
          errorEl.classList.remove('hidden');
        }
      });
    }

    function loadUnderlings(store) {
      callAPI("getUnderlings", { store: store }, function(list) {
        subordinateCache = list;
        const select = document.getElementById('underling-select');
        select.innerHTML = '<option value="">-- 請選擇店內學員 --</option>';
        list.forEach(u => {
          select.innerHTML += `<option value="${u.empId}">${u.name} (${u.empId})</option>`;
        });
      });
    }

    function onUnderlingChange() {
      const select = document.getElementById('underling-select');
      const selectedId = select.value;
      const infoCard = document.getElementById('info-card-container');
      const formContainer = document.getElementById('evaluation-form-container');
      
      if (selectedId) {
        const sub = subordinateCache.find(u => u.empId === selectedId);
        if (sub) {
          document.getElementById('info-name').innerText = sub.name;
          document.getElementById('info-store').innerText = `${sub.area} / ${sub.store}`;
          document.getElementById('info-transfer').innerText = sub.transferDate || "-";
          document.getElementById('info-eval-date').innerText = getMinguoToday();
          
          infoCard.classList.remove('hidden');
          formContainer.classList.remove('hidden'); // 解鎖表單
          
          setTimeout(() => {
            toggleSignatureType(); 
          }, 50);
          return;
        }
      }
      infoCard.classList.add('hidden');
      formContainer.classList.add('hidden'); 
    }

    function getMinguoToday() {
      const today = new Date();
      const yy = today.getFullYear() - 1911;
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const dd = String(today.getDate()).padStart(2, '0');
      return `${yy}/${mm}/${dd}`;
    }

    function submitForm() {
      const underlingSelect = document.getElementById('underling-select');
      const underlingId = underlingSelect.value;
      const underlingName = document.getElementById('info-name').innerText;
      const comment = document.getElementById('manager-comment').value.trim();
      const useSavedSig = document.getElementById('use-saved-sig').checked;
      
      if(!underlingId) {
        alert("請先選擇要考核的學員！");
        return;
      }
      
      for(let i=1; i<=6; i++) {
        if(!selectedScores[i]) {
          alert(`請為第 ${i} 項「${metrics[i-1].title}」給予確切評分！`);
          return;
        }
      }
      
      if(!comment) {
        alert("請填寫店經理評語！");
        return;
      }

      let sigBase64 = "";
      if (!useSavedSig) {
        if (isCanvasBlank()) {
          alert("請在下方手寫板簽名，或勾選使用系統預存簽名！");
          return;
        }
        sigBase64 = canvas.toDataURL();
      }
      
      pendingPayload = {
        managerId: currentUser.empId,
        store: currentUser.store,
        underlingId: underlingId,
        underlingName: underlingName,
        score1: selectedScores[1],
        score2: selectedScores[2],
        score3: selectedScores[3],
        score4: selectedScores[4],
        score5: selectedScores[5],
        score6: selectedScores[6],
        comment: comment,
        evalDate: getMinguoToday(),
        signatureType: useSavedSig ? "saved" : "manual",
        signatureBase64: sigBase64,
        savedSignaturePath: currentUser.savedSignature
      };
      
      document.getElementById('confirm-modal-text').innerText = `確定要送出對 [ ${underlingName} ] 的本月考核嗎？送出後店長將無法再修改分數！`;
      document.getElementById('custom-confirm-modal').classList.remove('hidden');
    }

    function closeConfirmModal() {
      document.getElementById('custom-confirm-modal').classList.add('hidden');
      pendingPayload = null;
    }

    function executeSubmit() {
      if(!pendingPayload) return;
      
      const payloadToSend = pendingPayload; // 備份防 null
      document.getElementById('custom-confirm-modal').classList.add('hidden'); 
      
      callAPI("submit", { formData: payloadToSend }, function(res) {
        if(res.success) {
          alert(res.message);
          document.getElementById('underling-select').value = '';
          document.getElementById('manager-comment').value = '';
          document.getElementById('info-card-container').classList.add('hidden');
          document.getElementById('evaluation-form-container').classList.add('hidden');
          selectedScores = {};
          activeRanges = {};
          pendingPayload = null; 
          clearSignatureCanvas();
          renderMetrics();
        } else {
          alert("儲儲失敗：" + res.message);
          pendingPayload = null;
        }
      });
    }

    function logout() {
      currentUser = null;
      subordinateCache = [];
      selectedScores = {};
      activeRanges = {};
      pendingPayload = null;
      document.getElementById('app-container').classList.add('hidden');
      document.getElementById('login-container').classList.remove('hidden');
      document.getElementById('emp-id').value = '';
      document.getElementById('id-tail').value = '';
      document.getElementById('manager-comment').value = '';
      document.getElementById('underling-select').value = '';
      document.getElementById('info-card-container').classList.add('hidden');
      document.getElementById('evaluation-form-container').classList.add('hidden');
      clearSignatureCanvas();
      renderMetrics();
    }

    function showLoading(show) {
      const spinner = document.getElementById('loading-spinner');
      if(show) {
        spinner.classList.remove('hidden');
        document.body.style.overflow = "hidden"; 
      } else {
        spinner.classList.add('hidden');
        document.body.style.overflow = ""; 
      }
    }
  </script>
</body>
</html>
